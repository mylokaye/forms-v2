<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Form Layout Preview</title>
    <meta type="xrm/designer/setting" name="type" value="marketing-designer-content-editor-document">
        <meta type="xrm/designer/setting" name="layout-editable" value="marketing-designer-layout-editable">
        <meta type="xrm/designer/setting" name="layout-max-width" value="600px" datatype="text" label="Layout max width">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eeeeee;
      font-family: Arial, Helvetica, sans-serif;
      color: #202020;
    }

    .page {
      width: min(100% - 32px, 760px);
      margin: 18px auto;
      background: #ffffff;
      padding: 36px 44px;
      border-radius: 18px;
    }

    .form-stack {
      display: grid;
      gap: 30px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .field {
      display: grid;
    }

    .field label {
      justify-self: start;
      display: inline-block;
      padding: 9px 10px;
      border-radius: 4px 4px 0 0;
      background: #eeeeee;
      color: #202020;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
      transition: background 160ms ease, color 160ms ease;
    }

    .field:has(:required) label::after {
      content: " *";
      color: #d93025;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #d9d9d9;
      border-radius: 0 8px 8px 8px;
      background-color: #ffffff;
      color: #202020;
      font-size: 16px;
      font-weight: 400;
      outline: none;
      font-family: inherit;
      transition: border-color 160ms ease;
    }

    .field input,
    .field select {
      min-height: 60px;
      line-height: 1;
    }

    .field textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.35;
    }

    .field select {
      appearance: none;
      cursor: pointer;
      background-image:
        linear-gradient(45deg, transparent 50%, #202020 50%),
        linear-gradient(135deg, #202020 50%, transparent 50%);
      background-position:
        calc(100% - 24px) 50%,
        calc(100% - 14px) 50%;
      background-size: 10px 10px;
      background-repeat: no-repeat;
    }

    /* Filled state */
    .field:has(input:not(:placeholder-shown)) label,
    .field:has(textarea:not(:placeholder-shown)) label,
    .field:has(select:valid) label {
      background: #188038;
      color: #ffffff;
    }

    .field:has(input:not(:placeholder-shown)) input,
    .field:has(textarea:not(:placeholder-shown)) textarea,
    .field:has(select:valid) select {
      border-color: #188038;
    }

    /* Focused state */
    .field:focus-within label {
      background: #1a73e8;
      color: #ffffff;
    }

    .field:has(:required):has(input:not(:placeholder-shown)) label::after,
    .field:has(:required):has(textarea:not(:placeholder-shown)) label::after,
    .field:has(:required):has(select:valid) label::after,
    .field:has(:required):focus-within label::after {
      color: #ffffff;
    }

    .field:focus-within input,
    .field:focus-within select,
    .field:focus-within textarea {
      border-color: #1a73e8;
    }

    /* Invalid email state */
    .field:has(input[type="email"]:not(:placeholder-shown):invalid) label {
      background: #d93025;
      color: #ffffff;
    }

    .field:has(input[type="email"]:not(:placeholder-shown):invalid) input {
      border-color: #d93025;
    }

    .form-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      margin-top: 4px;
    }

    .submit-button {
      min-width: 170px;
      min-height: 58px;
      border: 0;
      border-radius: 10px;
      background: #202124;
      color: #ffffff;
      font-size: 19px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 120ms ease, background 160ms ease;
    }

    .submit-button:hover {
      background: #111111;
    }

    .submit-button:active {
      transform: scale(0.98);
    }

    .submit-button:focus-visible {
      outline: 4px solid rgba(26, 115, 232, 0.25);
      outline-offset: 3px;
    }

    @media (max-width: 820px) {
      .page {
        padding: 28px 22px;
        border-radius: 0;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .form-actions {
        display: grid;
        gap: 16px;
      }

      .submit-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <form class="form-stack">

            <div data-layout="true" data-layout-version="v2" style="max-width: 600px; margin: auto;" data-layout-width="600px"></div>

      <div class="form-row">
        <div class="field">

  <div class="textFormFieldBlock" data-editorblocktype="TextFormField" data-targetaudience="contact" data-targetproperty="firstname" data-prefill="false">

          <label for="first-name">First Name</label>
          <input id="first-name" name="first_name" type="text" value="Bruce" placeholder=" " autocomplete="given-name" required />
        </div></div>

        <div class="field">
            <div class="textFormFieldBlock" data-editorblocktype="TextFormField" data-targetaudience="contact" data-targetproperty="lastname" data-prefill="false">

          <label for="last-name">Last Name</label>
          <input id="last-name" name="last_name" type="text" placeholder=" " autocomplete="family-name" required />
        </div> </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder=" " autocomplete="email" inputmode="email" required />
        </div>

        <div class="field">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" placeholder=" " autocomplete="tel" inputmode="tel" />
        </div>
      </div>

      <div class="field">
        <label for="country">Country</label>
        <select id="country" name="country" autocomplete="country-name" required>
          <option value="" selected disabled>Select</option>
          <option value="japan">Japan</option>
          <option value="brazil">Brazil</option>
          <option value="norway">Norway</option>
        </select>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder=" " required></textarea>
      </div>

      <div class="form-actions">
        <button class="submit-button" type="submit">Submit</button>
      </div>
    </form>
  </main>
</body>
</html>
