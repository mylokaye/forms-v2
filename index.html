<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Verification Form</title>

  <style>
    /* 1. Design tokens */
    :root {
      --color-bg: #f6f8fb;
      --color-surface: #ffffff;
      --color-text: #172033;
      --color-muted: #667085;
      --color-border: #d0d5dd;
      --color-primary: #005eb8;
      --color-primary-hover: #004a94;
      --color-button-muted: #d1d7e1;
      --color-button-muted-border: #bac2ce;
      --color-button-muted-hover: #667085;
      --color-error: #b42318;
      --color-focus: #7cc4ff;
      --color-progress: #14b8a6;
      --color-progress-soft: #ccfbf1;
      --color-success: #027a48;

      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;

      --radius-sm: 6px;
      --radius-md: 10px;

      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    /* 2. Reset / base styles */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    /* 3. Layout */
    .page-shell {
      width: 100%;
      max-width: 40.8rem;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
    }

    .form-shell {
      display: grid;
      gap: var(--space-lg);
      padding: var(--space-lg);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }

    .form-header {
      display: grid;
      gap: var(--space-xs);
    }

    .form-header__title {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .form-header__text {
      margin: 0;
      color: var(--color-muted);
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-sm);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .progress__item {
      position: relative;
      display: grid;
      align-items: start;
      justify-items: center;
      min-width: 0;
      color: var(--color-muted);
      text-align: center;
    }

    .progress__marker {
      display: inline-grid;
      width: 1.75rem;
      height: 1.75rem;
      place-items: center;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-muted);
      font-size: 0.875rem;
      font-weight: 700;
      line-height: 1;
    }

    .progress__marker svg {
      width: 1rem;
      height: 1rem;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3;
    }

    .progress__item[aria-current="step"] .progress__marker {
      border-color: var(--color-progress);
      background: var(--color-progress);
      color: var(--color-surface);
      box-shadow: 0 0 0 0.25rem var(--color-progress-soft);
    }

    .progress__item.is-complete .progress__marker {
      border-color: var(--color-success);
      background: var(--color-success);
      color: var(--color-surface);
    }

    .progress__item.is-complete::after,
    .progress__item[aria-current="step"]::after {
      background: var(--color-progress);
    }

    .progress__item::before {
      position: absolute;
      top: 0.875rem;
      right: calc(50% + 1.25rem);
      left: calc(-50% + 1.25rem);
      height: 2px;
      background: var(--color-border);
      content: "";
    }

    .progress__item::after {
      position: absolute;
      top: 0.875rem;
      right: calc(50% + 1.25rem);
      left: calc(-50% + 1.25rem);
      height: 2px;
      background: transparent;
      content: "";
    }

    .progress__item:first-child::before,
    .progress__item:first-child::after {
      display: none;
    }

    /* 4. Form components */
    .form {
      display: grid;
      gap: var(--space-lg);
    }

    .form__section {
      display: grid;
      gap: var(--space-lg);
    }

    .form__section[hidden] {
      display: none;
    }

    .form-page[hidden] {
      display: none;
    }

    .form-page {
      display: grid;
      gap: var(--space-lg);
    }

    .form__section-title {
      grid-column: 1 / -1;
      margin: 0;
      color: var(--color-text);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .form__section-title[hidden] {
      display: none;
    }

    .form__section--full-width {
      grid-column: 1 / -1;
    }

    .form__field {
      position: relative;
      display: grid;
    }

    .form__control {
      position: relative;
    }

    .form__label {
      position: absolute;
      top: 0.55rem;
      left: 0.75rem;
      z-index: 1;
      max-width: calc(100% - 1.5rem);
      overflow: hidden;
      color: var(--color-muted);
      font-size: 0.8125rem;
      font-weight: 400;
      line-height: 1.2;
      pointer-events: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .form__field:focus-within .form__label {
      color: var(--color-primary);
    }

    .form__input {
      width: 100%;
      min-height: 4.25rem;
      padding: 1.85rem 3rem 0.65rem 0.75rem;
      resize: vertical;
      color: var(--color-text);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
    }

    .form__control .form__input {
      padding-right: 2.75rem;
    }

    .form__field-status {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      color: #ffffff;
      background: var(--color-success);
      border: 1px solid var(--color-success);
      border-radius: 999px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .form__field-status[hidden] {
      display: none;
    }

    .form__field-status svg {
      width: 1rem;
      height: 1rem;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3;
    }

    .form__input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-focus);
      outline: none;
    }

    .form .form__input:focus {
      border-color: var(--color-primary);
    }

    textarea.form__input {
      min-height: 7.5rem;
      line-height: 1.45;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .form__validation-icon {
      position: absolute;
      top: 2.65rem;
      right: 0.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      color: #ffffff;
      border-radius: 999px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .form__validation-icon[hidden] {
      display: none;
    }

    .form__validation-icon--success {
      background: var(--color-success);
    }

    .form__validation-icon--error {
      background: var(--color-error);
    }

    .form__validation-icon svg {
      width: 1rem;
      height: 1rem;
      stroke: currentColor;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* 5. Buttons */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: 0.75rem 1rem;
      color: #ffffff;
      font-weight: 700;
      text-align: center;
      background: var(--color-button-muted);
      border: 1px solid var(--color-button-muted-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .button[hidden] {
      display: none;
    }

    .button:hover {
      background: var(--color-button-muted-hover);
      border-color: var(--color-button-muted-hover);
    }

    .button--ready {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    .button--ready:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }

    .button--secondary {
      background: var(--color-button-muted);
      border-color: var(--color-button-muted-border);
    }

    .button--secondary:hover {
      background: var(--color-button-muted-hover);
      border-color: var(--color-button-muted-hover);
    }

    .button:focus {
      box-shadow: 0 0 0 3px var(--color-focus);
      outline: none;
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.85;
    }

    /* 6. Messages and validation */
    .form__message {
      margin: 0;
      color: var(--color-muted);
      font-size: 0.9375rem;
    }

    .form__message--error {
      color: var(--color-error);
    }

    .form__actions {
      display: flex;
      gap: var(--space-md);
      justify-content: space-between;
    }

    .form__actions .button {
      width: calc((100% - (var(--space-md) * 2)) / 3);
    }

    .form__actions .button:last-child {
      margin-left: auto;
      width: min(219px, calc(((100% - (var(--space-md) * 2)) / 3) * 2));
    }

    .form__actions.is-final .button:last-child {
      width: 100%;
    }

    .form__actions .button--secondary {
      font-weight: 300;
    }

    /* 7. Responsive rules */
    @media (min-width: 48rem) {
      .page-shell {
        padding-top: 4rem;
      }

      .form__section--two-columns {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form__section--three-columns {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

    }
  </style>


</head>
<body>
  <main class="page-shell">
    <section class="form-shell" aria-labelledby="form-heading">
      <ol class="progress" aria-label="Form progress">
        <li class="progress__item" data-progress-step="1" aria-current="step">
          <span class="progress__marker" aria-hidden="true">1</span>
        </li>
        <li class="progress__item" data-progress-step="2">
          <span class="progress__marker" aria-hidden="true">2</span>
        </li>
        <li class="progress__item" data-progress-step="3">
          <span class="progress__marker" aria-hidden="true">3</span>
        </li>
      </ol>

      <div class="form-header">
        <h1 id="form-heading" class="form-header__title">Inquiry</h1>
        <p class="form-header__text"></p>
      </div>

      <form class="form" novalidate>
        <div class="form-page" id="page-1">
          <h2 class="form__section-title" data-review-title hidden>Inquiry</h2>

          <div class="form__field">
            <label class="form__label" for="email">Email address</label>
            <div class="form__control">
              <input
                class="form__input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                inputmode="email"
                value="mylo.kaye@google.com"
                aria-describedby="email-validation-status"
                aria-invalid="false"
              >
              <span
                class="form__validation-icon"
                id="email-validation-icon"
                aria-hidden="true"
                hidden
              ></span>
            </div>
            <span id="email-validation-status" class="visually-hidden" aria-live="polite"></span>
          </div>

          <div class="form__field">
            <label class="form__label" for="message">Inquiry</label>
            <textarea
              class="form__input"
              id="message"
              name="message"
              rows="3"
            ></textarea>
          </div>
        </div>

        <div class="form-page form__section form__section--three-columns" id="verified-fields" hidden>
          <h2 class="form__section-title" data-review-title hidden>Details</h2>

          <div class="form__field">
            <label class="form__label" for="first-name">First name</label>
            <input
              class="form__input"
              id="first-name"
              name="firstName"
              type="text"
              autocomplete="given-name"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="last-name">Last name</label>
            <input
              class="form__input"
              id="last-name"
              name="lastName"
              type="text"
              autocomplete="family-name"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="phone">Phone number</label>
            <input
              class="form__input"
              id="phone"
              name="phone"
              type="tel"
              autocomplete="tel"
              inputmode="tel"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="role">Role</label>
            <input
              class="form__input"
              id="role"
              name="role"
              type="text"
              autocomplete="organization-title"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="website">Website</label>
            <input
              class="form__input"
              id="website"
              name="website"
              type="url"
              autocomplete="url"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="company-name">Company name</label>
            <input
              class="form__input"
              id="company-name"
              name="companyName"
              type="text"
              autocomplete="organization"
            >
          </div>
        </div>

        <div class="form__actions">
          <button
            class="button button--secondary"
            type="button"
            id="back-button"
            hidden
          >
            Back
          </button>
          <button
            class="button"
            type="button"
            id="verify-button"
            aria-controls="page-1 verified-fields enriched-fields"
            aria-expanded="false"
          >
            Continue
          </button>
        </div>

        <div class="form-page form__section form__section--two-columns" id="enriched-fields" hidden>
          <h2 class="form__section-title">Hidden</h2>

          <div class="form__field form__section--full-width">
            <label class="form__label" for="about">About</label>
            <textarea
              class="form__input"
              id="about"
              name="about"
              rows="4"
            ></textarea>
          </div>

          <div class="form__field">
            <label class="form__label" for="urgency">Urgency</label>
            <input
              class="form__input"
              id="urgency"
              name="urgency"
              type="text"
              autocomplete="off"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="sentiment">Sentiment</label>
            <input
              class="form__input"
              id="sentiment"
              name="sentiment"
              type="text"
              autocomplete="off"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="query">Query</label>
            <input
              class="form__input"
              id="query"
              name="query"
              type="text"
              autocomplete="off"
            >
          </div>

          <div class="form__field">
            <label class="form__label" for="industry">Industry</label>
            <input
              class="form__input"
              id="industry"
              name="industry"
              type="text"
              autocomplete="off"
            >
          </div>
        </div>

        <p class="form__message" id="form-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script>
    // 1. DOM references
    const emailField = document.getElementById("email");
    const validationIcon = document.getElementById("email-validation-icon");
    const validationStatus = document.getElementById("email-validation-status");
    const pageOne = document.getElementById("page-1");
    const formHeading = document.getElementById("form-heading");
    const formHeaderText = document.querySelector(".form-header__text");
    const progressSteps = document.querySelectorAll("[data-progress-step]");
    const reviewTitles = document.querySelectorAll("[data-review-title]");
    const backButton = document.getElementById("back-button");
    const verifyButton = document.getElementById("verify-button");
    const formActions = document.querySelector(".form__actions");
    const verifiedFields = document.getElementById("verified-fields");
    const firstNameField = document.getElementById("first-name");
    const lastNameField = document.getElementById("last-name");
    const phoneField = document.getElementById("phone");
    const websiteField = document.getElementById("website");
    const companyNameField = document.getElementById("company-name");
    const enrichedFields = document.getElementById("enriched-fields");
    const industryField = document.getElementById("industry");
    const roleField = document.getElementById("role");
    const aboutField = document.getElementById("about");
    const messageField = document.getElementById("message");
    const urgencyField = document.getElementById("urgency");
    const sentimentField = document.getElementById("sentiment");
    const queryField = document.getElementById("query");
    const formMessage = document.getElementById("form-message");

    // 2. Configuration
    const COMPANY_ENRICHMENT_ENDPOINT = "http://127.0.0.1:8787/enrich-company";
    const PAGE_COPY = {
      1: {
        title: "Inquiry",
        description: "How can we help you today?"
      },
      2: {
        title: "Details",
        description: "Confirm your information"
      },
      3: {
        title: "Finish",
        description: "Confirm your inquiry"
      }
    };
    const STATUS_FIELDS = [
      emailField,
      messageField,
      firstNameField,
      lastNameField,
      phoneField,
      roleField,
      websiteField,
      companyNameField
    ].filter(Boolean);
    let currentPage = 1;

    // 3. Utility functions
    function capitaliseWord(value) {
      if (!value) return "";

      return value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
    }

    function createIconPath(d) {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

      path.setAttribute("d", d);

      return path;
    }

    function createIcon(paths) {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");

      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("focusable", "false");
      paths.forEach((path) => svg.appendChild(createIconPath(path)));

      return svg;
    }

    function setValidationIcon(isValid) {
      if (!validationIcon) return;

      validationIcon.hidden = false;
      validationIcon.classList.toggle("form__validation-icon--success", isValid);
      validationIcon.classList.toggle("form__validation-icon--error", !isValid);
      validationIcon.replaceChildren(
        isValid
          ? createIcon(["M5 12.5l4 4L19 7"])
          : createIcon(["M7 7l10 10", "M17 7L7 17"])
      );
    }

    function ensureFieldStatus(field) {
      const fieldWrapper = field.closest(".form__field");

      if (!fieldWrapper) return null;

      let statusIcon = fieldWrapper.querySelector(".form__field-status");

      if (!statusIcon) {
        statusIcon = document.createElement("span");
        statusIcon.className = "form__field-status";
        statusIcon.setAttribute("aria-hidden", "true");
        fieldWrapper.appendChild(statusIcon);
      }

      return statusIcon;
    }

    function updateFieldStatus(field) {
      const statusIcon = ensureFieldStatus(field);

      if (!statusIcon) return;

      const hasValue = field === emailField
        ? isValidEmail(field.value)
        : Boolean(getFieldValue(field));

      statusIcon.hidden = !hasValue;

      if (hasValue) {
        statusIcon.replaceChildren(createIcon(["M5 12.5l4 4L19 7"]));
      } else {
        statusIcon.replaceChildren();
      }
    }

    function updateFieldStatuses() {
      STATUS_FIELDS.forEach(updateFieldStatus);
    }

    // 4. Validation functions
    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
    }

    function getEmailParts(value) {
      const trimmedValue = value.trim();
      const atIndex = trimmedValue.indexOf("@");

      if (atIndex === -1) {
        return {
          localPart: "",
          domain: ""
        };
      }

      return {
        localPart: trimmedValue.slice(0, atIndex),
        domain: trimmedValue.slice(atIndex + 1).toLowerCase()
      };
    }

    function getNameParts(localPart) {
      // Auto-fill is heuristic until a real verification data source is connected.
      const parts = localPart
        .split(/[._-]+/)
        .map((part) => part.replace(/[^a-zA-Z]/g, ""))
        .filter(Boolean);

      return {
        firstName: capitaliseWord(parts[0] || ""),
        lastName: capitaliseWord(parts.slice(1).join(" "))
      };
    }

    function getCompanyName(domain) {
      const hostName = domain
        .replace(/^www\./, "")
        .split(".")[0] || "";

      return hostName
        .split(/[-_]+/)
        .filter(Boolean)
        .map(capitaliseWord)
        .join(" ");
    }

    function getFieldValue(field) {
      return field ? field.value.trim() : "";
    }

    function getWebsiteUrl(value) {
      const trimmedValue = value.trim();

      if (!trimmedValue) return "";

      return /^https?:\/\//i.test(trimmedValue)
        ? trimmedValue
        : `https://${trimmedValue}`;
    }

    function hasVerifiedFieldEntries() {
      return [firstNameField, lastNameField, websiteField, companyNameField]
        .every((field) => getFieldValue(field));
    }

    // 5. State / UI functions
    function setFormMessage(message, isError = false) {
      if (!formMessage) return;

      formMessage.textContent = message;
      formMessage.classList.toggle("form__message--error", isError);
    }

    function isPrimaryReady() {
      if (currentPage === 1) {
        return Boolean(emailField && isValidEmail(emailField.value));
      }

      if (currentPage === 2) {
        return hasVerifiedFieldEntries();
      }

      return true;
    }

    function updateNavigationState() {
      if (backButton) {
        backButton.hidden = currentPage !== 2;
      }

      if (formActions) {
        formActions.classList.toggle("is-final", currentPage === 3);
      }

      if (!verifyButton) return;

      if (!verifyButton.disabled) {
        verifyButton.textContent = currentPage === 3 ? "Submit Inquiry" : "Continue";
      }

      verifyButton.classList.toggle("button--ready", isPrimaryReady());
      verifyButton.setAttribute("aria-expanded", String(currentPage > 1));
    }

    function updatePageCopy() {
      const pageCopy = PAGE_COPY[currentPage] || PAGE_COPY[1];

      if (formHeading) {
        formHeading.textContent = pageCopy.title;
      }

      if (formHeaderText) {
        formHeaderText.textContent = pageCopy.description;
      }
    }

    function updateProgress() {
      progressSteps.forEach((step) => {
        const stepNumber = Number(step.dataset.progressStep);
        const marker = step.querySelector(".progress__marker");
        const isComplete = stepNumber < currentPage;
        const isCurrent = stepNumber === currentPage;

        step.classList.toggle("is-complete", isComplete);

        if (isCurrent) {
          step.setAttribute("aria-current", "step");
        } else {
          step.removeAttribute("aria-current");
        }

        if (!marker) return;

        if (isComplete) {
          marker.replaceChildren(createIcon(["M5 12.5l4 4L19 7"]));
          return;
        }

        marker.textContent = String(stepNumber);
      });
    }

    function showPage(pageNumber) {
      currentPage = pageNumber;

      if (pageOne) {
        pageOne.hidden = pageNumber === 2;
      }

      if (verifiedFields) {
        verifiedFields.hidden = pageNumber === 1;
      }

      if (enrichedFields) {
        enrichedFields.hidden = pageNumber !== 3;
      }

      reviewTitles.forEach((title) => {
        title.hidden = pageNumber !== 3;
      });

      updatePageCopy();
      updateProgress();
      updateNavigationState();
    }

    function hideEnrichedFields() {
      if (enrichedFields) {
        enrichedFields.hidden = true;
      }

      if (industryField) {
        industryField.value = "";
      }

      if (roleField) {
        roleField.value = "";
      }

      if (aboutField) {
        aboutField.value = "";
      }

      if (urgencyField) {
        urgencyField.value = "";
      }

      if (sentimentField) {
        sentimentField.value = "";
      }

      if (queryField) {
        queryField.value = "";
      }
    }

    function hideVerifiedFields() {
      if (verifiedFields) {
        verifiedFields.hidden = true;
      }

      hideEnrichedFields();
      showPage(1);
    }

    function resetValidationFeedback() {
      if (validationIcon) {
        validationIcon.hidden = true;
        validationIcon.replaceChildren();
      }

      if (emailField) {
        emailField.setAttribute("aria-invalid", "false");
      }

      if (validationStatus) {
        validationStatus.textContent = "";
      }
    }

    function populateVerifiedFields() {
      if (
        !emailField ||
        !firstNameField ||
        !lastNameField ||
        !websiteField ||
        !companyNameField ||
        !verifiedFields ||
        !verifyButton
      ) {
        return;
      }

      const emailParts = getEmailParts(emailField.value);
      const nameParts = getNameParts(emailParts.localPart);

      firstNameField.value = nameParts.firstName;
      lastNameField.value = nameParts.lastName;
      websiteField.value = emailParts.domain;
      companyNameField.value = getCompanyName(emailParts.domain);
      updateFieldStatuses();
      updateVerifiedButtonState();
    }

    function updateEmailValidation() {
      if (!emailField || !validationStatus) return;

      const isValid = isValidEmail(emailField.value);

      emailField.setAttribute("aria-invalid", String(!isValid));
      validationStatus.textContent = isValid
        ? "Email address looks valid."
        : "Enter a valid email address.";

      if (isValid) {
        populateVerifiedFields();
      } else {
        hideVerifiedFields();
      }
    }

    function setVerifyLoading(isLoading) {
      if (!verifyButton) return;

      verifyButton.disabled = isLoading;
      verifyButton.textContent = isLoading ? "One moment..." : "Continue";

      if (!isLoading) {
        updateNavigationState();
      }
    }

    async function enrichCompanyDetails() {
      if (
        !websiteField ||
        !industryField ||
        !aboutField ||
        !urgencyField ||
        !sentimentField ||
        !queryField ||
        !enrichedFields
      ) {
        return;
      }

      const companyUrl = getWebsiteUrl(getFieldValue(websiteField));

      if (!companyUrl) {
        setFormMessage("Enter a company website before verifying company details.", true);
        return false;
      }

      setVerifyLoading(true);
      setFormMessage("");

      try {
        const response = await fetch(COMPANY_ENRICHMENT_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            companyUrl,
            message: getFieldValue(messageField)
          })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Company enrichment failed.");
        }

        industryField.value = result.industry || "";
        aboutField.value = result.about || "";
        urgencyField.value = result.urgency || "";
        sentimentField.value = result.sentiment || "";
        queryField.value = result.query || "";
        updateFieldStatuses();
        setFormMessage("Company details verified.");
        return true;
      } catch (error) {
        const message = error instanceof TypeError
          ? "Company enrichment proxy is not running."
          : error.message || "Company enrichment failed.";

        setFormMessage(message, true);
        return false;
      } finally {
        setVerifyLoading(false);
      }
    }

    function updateVerifyButtonState() {
      if (!emailField || !verifyButton) return;

      verifyButton.classList.toggle("button--ready", isValidEmail(emailField.value));
      updateFieldStatuses();
      resetValidationFeedback();
      hideVerifiedFields();
      setFormMessage("");
    }

    function updateVerifiedButtonState() {
      if (!verifyButton) return;

      updateFieldStatuses();
      updateNavigationState();
    }

    async function handlePrimaryAction() {
      if (currentPage === 3) {
        setFormMessage("Inquiry submitted.");
        return;
      }

      if (currentPage === 2) {
        if (!hasVerifiedFieldEntries()) {
          setFormMessage("Enter first name, last name, website, and company name before continuing.", true);
          return;
        }

        const didEnrich = await enrichCompanyDetails();
        showPage(3);

        if (didEnrich) {
          setFormMessage("");
        }

        return;
      }

      updateEmailValidation();

      if (!emailField || !isValidEmail(emailField.value)) {
        setFormMessage("Enter a valid email address.", true);
        return;
      }

      showPage(2);
      setFormMessage("");
    }

    function handleBack() {
      if (currentPage === 3) {
        showPage(2);
        setFormMessage("");
        return;
      }

      showPage(1);
      setFormMessage("");
    }

    // 7. Event listeners
    if (emailField) {
      emailField.addEventListener("input", updateVerifyButtonState);
    }

    if (messageField) {
      messageField.addEventListener("input", updateFieldStatuses);
    }

    [firstNameField, lastNameField, phoneField, roleField, websiteField, companyNameField]
      .filter(Boolean)
      .forEach((field) => {
        field.addEventListener("input", updateVerifiedButtonState);
      });

    if (backButton) {
      backButton.addEventListener("click", handleBack);
    }

    if (verifyButton) {
      verifyButton.addEventListener("click", handlePrimaryAction);
    }

    updateFieldStatuses();
    showPage(1);
  </script>
</body>
</html>
